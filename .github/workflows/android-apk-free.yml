name: Android APK Free Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk-free.yml"

jobs:
  build_apk:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "mobile/package-lock.json"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate CI .env
        shell: bash
        run: |
          cp .env.build.example .env
          API_URL="${EXPO_PUBLIC_API_BASE_URL}"
          if [ -z "$API_URL" ]; then
            API_URL="https://forex-pulse-api.onrender.com"
          fi
          {
            echo "EXPO_PUBLIC_API_BASE_URL=$API_URL"
            echo "EXPO_PUBLIC_APP_NAME=Forex Pulse"
            echo "EXPO_PUBLIC_APP_SLUG=forex-pulse"
            echo "EXPO_PUBLIC_APP_VERSION=1.0.0"
            echo "EXPO_PUBLIC_EXPO_OWNER=teows-organization"
            echo "EXPO_PUBLIC_ANDROID_PACKAGE=com.forexpulse.mobile"
            echo "EXPO_PUBLIC_ANDROID_VERSION_CODE=1"
            echo "EXPO_PUBLIC_EAS_PROJECT_ID=96db8ac6-5a48-442d-aff0-76f892fa108e"
          } >> .env
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

      - name: Expo prebuild (Android)
        run: CI=1 npx expo prebuild --platform android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forex-pulse-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
