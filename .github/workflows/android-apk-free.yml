name: Android APK Free Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/android-apk-free.yml"

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "mobile/package-lock.json"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate CI .env
        shell: bash
        run: |
          cp .env.build.example .env
          API_URL="${EXPO_PUBLIC_API_BASE_URL}"
          if [ -z "$API_URL" ]; then
            API_URL="https://forex-pulse-api.onrender.com"
          fi
          APP_VERSION_CODE=$((GITHUB_RUN_NUMBER + 49))
          APP_VERSION_NAME="1.0.${APP_VERSION_CODE}"
          APP_DISPLAY_NAME="Forex Pulse ${APP_VERSION_CODE}"
          echo "APP_VERSION_CODE=$APP_VERSION_CODE" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> "$GITHUB_ENV"
          echo "APP_DISPLAY_NAME=$APP_DISPLAY_NAME" >> "$GITHUB_ENV"
          {
            echo "EXPO_PUBLIC_API_BASE_URL=$API_URL"
            echo "EXPO_PUBLIC_APP_NAME=$APP_DISPLAY_NAME"
            echo "EXPO_PUBLIC_APP_SLUG=forex-pulse"
            echo "EXPO_PUBLIC_APP_VERSION=$APP_VERSION_NAME"
            echo "EXPO_PUBLIC_EXPO_OWNER=teows-organization"
            echo "EXPO_PUBLIC_ANDROID_PACKAGE=com.forexpulse.mobile"
            echo "EXPO_PUBLIC_ANDROID_VERSION_CODE=$APP_VERSION_CODE"
            echo "EXPO_PUBLIC_EAS_PROJECT_ID=96db8ac6-5a48-442d-aff0-76f892fa108e"
            echo "EXPO_PUBLIC_IOS_BUILD_NUMBER=$APP_VERSION_CODE"
          } >> .env
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}

      - name: Expo prebuild (Android)
        shell: bash
        run: |
          set -o pipefail
          CI=1 npx expo prebuild --platform android --non-interactive 2>&1 | tee expo-prebuild.log

      - name: Verify Gradle wrapper
        shell: bash
        run: |
          test -f android/gradlew || (echo "android/gradlew missing after prebuild" && exit 1)

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace --warning-mode all 2>&1 | tee ../gradle-build.log

      - name: Show Gradle failure tail
        if: failure()
        shell: bash
        run: |
          echo "==== Last 120 lines of expo-prebuild.log ===="
          tail -n 120 expo-prebuild.log || true
          echo "==== Last 200 lines of gradle-build.log ===="
          tail -n 200 gradle-build.log || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forex-pulse-${{ env.APP_VERSION_CODE }}-build-logs
          path: |
            mobile/gradle-build.log
            mobile/expo-prebuild.log
          if-no-files-found: warn

      - name: Upload release APK artifact
        if: success() && hashFiles('mobile/android/app/build/outputs/apk/release/app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: forex-pulse-${{ env.APP_VERSION_CODE }}-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
